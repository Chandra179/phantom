syntax = "proto3";

package compute;

option go_package = "phantom/gen/computepb";

service ComputeService {
  rpc PercentChanges(PercentChangesRequest) returns (PercentChangesResponse);
  rpc BuildWindow(BuildWindowRequest) returns (BuildWindowResponse);
  rpc OLSMarketModel(OLSMarketModelRequest) returns (OLSMarketModelResponse);
  rpc AbnormalReturn(AbnormalReturnRequest) returns (AbnormalReturnResponse);
  rpc CumulativeAbnormalReturn(CARRequest) returns (CARResponse);
  rpc TTestOneSample(TTestRequest) returns (TTestResponse);
  rpc EuclideanDistance(EuclideanDistanceRequest) returns (EuclideanDistanceResponse);
  rpc DTWDistance(DTWDistanceRequest) returns (DTWDistanceResponse);
}

message PercentChangesRequest {
  repeated double prices = 1;
}
message PercentChangesResponse {
  repeated double changes = 1;
}

message BuildWindowRequest {
  repeated double all_prices = 1;
  uint32 t0_index = 2;
  uint32 est_days = 3;
  uint32 event_hours = 4;
}
message BuildWindowResponse {
  repeated double window = 1;
}

message OLSMarketModelRequest {
  repeated double r_i = 1;
  repeated double r_m = 2;
}
message OLSMarketModelResponse {
  double alpha = 1;
  double beta = 2;
  double sigma_eps = 3;
}

message AbnormalReturnRequest {
  repeated double actual_returns = 1;
  repeated double market_returns = 2;
  double alpha = 3;
  double beta = 4;
}
message AbnormalReturnResponse {
  repeated double ar = 1;
}

message CARRequest {
  repeated double ar = 1;
}
message CARResponse {
  double car = 1;
}

message TTestRequest {
  repeated double samples = 1;
}
message TTestResponse {
  double t_statistic = 1;
}

message EuclideanDistanceRequest {
  repeated double a = 1;
  repeated double b = 2;
}
message EuclideanDistanceResponse {
  double distance = 1;
}

message DTWDistanceRequest {
  repeated double a = 1;
  repeated double b = 2;
  uint32 band = 3;
}
message DTWDistanceResponse {
  double distance = 1;
}
